name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test backend
        run: |
          cd backend
          pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: |
          cd frontend
          npm ci
      - name: Test frontend
        run: |
          cd frontend
          npm test -- --run
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  burp-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build extension
        run: |
          cd burp-extension
          mvn test package
      - name: Upload extension JAR
        uses: actions/upload-artifact@v4
        with:
          name: burp-ai-extension-jar
          path: burp-extension/target/burp-ai-extension-*.jar
          if-no-files-found: error
          retention-days: 14
