services:
  backend:
    build:
      context: ./backend
    environment:
      BACKEND_TOKEN: ${BACKEND_TOKEN:-change-me-local-token}
      DATA_DIR: /app/data
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      BATCH_CONCURRENCY: ${BATCH_CONCURRENCY:-2}
      BATCH_MAX_ITEMS: ${BATCH_MAX_ITEMS:-20}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_BACKEND_TOKEN: ${VITE_BACKEND_TOKEN:-change-me-local-token}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
